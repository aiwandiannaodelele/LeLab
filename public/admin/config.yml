# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: aiwandiannaodelele/lele-site
  base_url: https://cmsauth.lelab.cc.cd

media_folder: public/images
public_folder: /images

locale: zh_Hans

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: content/posts
    create: true
    delete: true
    slug: "{{fields.slug}}"
    preview_path: posts/{{slug}}
    fields:
      - { label: 标题, name: title, widget: string, required: true }
      - { label: 链接标识 (slug), name: slug, widget: string, hint: "用于 URL，如 rethinking-static-sites", required: true }
      - { label: 发布日期, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { label: 摘要, name: excerpt, widget: text, required: false }
      - { label: 标签, name: tags, widget: list, required: false }
      - { label: 封面色, name: cover, widget: color, allow_input: true, required: false }
      - { label: 正文, name: body, widget: markdown, required: false }