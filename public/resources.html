    <script>
      var API =
        "https://api.gitcode.com/api/v5/repos/aiwandiannaodelele/lelabfiles/releases";

      document.getElementById("year").textContent = new Date().getFullYear();

      var startDate = new Date("2026-07-14T20:00:00");
      function calcRunningTime() {
        var diff = Math.max(0, Date.now() - startDate.getTime());
        var totalMinutes = Math.floor(diff / 60000);
        var minutes = totalMinutes % 60;
        var totalHours = (totalMinutes - minutes) / 60;
        var hours = totalHours % 24;
        var totalDays = (totalHours - hours) / 24;
        var days = totalDays % 30;
        var totalMonths = (totalDays - days) / 30;
        var months = totalMonths % 12;
        var years = (totalMonths - months) / 12;
        document.getElementById("running-time").textContent =
          "已运行 " + years + " 年 " + months + " 个月 " + days + " 天 " + hours + " 小时";
      }
      calcRunningTime();
      setInterval(calcRunningTime, 60000);

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[c];
        });
      }

      function formatExt(url) {
        var ext = (url.split(".").pop() || "").toLowerCase();
        var map = {
          exe: "可执行文件",
          zip: "ZIP",
          tar: "TAR",
          gz: "GZip",
          bz2: "BZip2",
          "7z": "7z",
        };
        return map[ext] || ext.toUpperCase();
      }

      function downloadIcon() {
        return (
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" ' +
          'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
          'stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
          '<polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
        );
      }

      function renderRelease(release) {
        var bodyHtml = "";
        if (release.body) {
          try {
            bodyHtml = marked.parse(release.body, { async: false });
          } catch (e) {
            bodyHtml = "<p>" + escapeHtml(release.body) + "</p>";
          }
        }
        var attachAssets = (release.assets || []).filter(function (a) {
          return a.type === "attach";
        });
        var assetsHtml = "";
        if (attachAssets.length > 0) {
          assetsHtml =
            '<div class="mt-5 space-y-2">' +
            attachAssets
              .map(function (asset) {
                var name = asset.name || "下载";
                var url = asset.browser_download_url || "#";
                return (
                  '<a href="' +
                  escapeHtml(url) +
                  '" target="_blank" rel="noopener noreferrer" ' +
                  'class="group flex items-center justify-between rounded-xl border border-border/60 px-4 py-3 transition-colors hover:bg-muted/60">' +
                  '<div class="flex items-center gap-3 min-w-0">' +
                  '<span class="grid size-9 shrink-0 place-items-center rounded-lg bg-primary/10 text-primary">' +
                  downloadIcon() +
                  "</span>" +
                  '<span class="text-sm font-medium truncate transition-colors group-hover:text-primary">' +
                  escapeHtml(name) +
                  "</span>" +
                  "</div>" +
                  '<span class="shrink-0 ml-3 rounded-full bg-muted px-2.5 py-0.5 text-[11px] text-muted-foreground">' +
                  escapeHtml(formatExt(url)) +
                  "</span>" +
                  "</a>"
                );
              })
              .join("") +
            "</div>";
        }
        return (
          '<div class="rounded-2xl border border-border/60 bg-card p-6">' +
          '<h2 class="font-heading text-xl font-semibold tracking-tight">' +
          escapeHtml(release.name || release.tag_name || "") +
          "</h2>" +
          (bodyHtml
            ? '<div class="prose-md mt-2 text-sm text-muted-foreground leading-relaxed [&_a]:text-primary [&_a]:underline">' +
              bodyHtml +
              "</div>"
            : "") +
          assetsHtml +
          "</div>"
        );
      }

      function setLoading() {
        document.getElementById("list").innerHTML =
          '<p class="text-sm text-muted-foreground">加载中...</p>';
      }

      function setEmpty() {
        document.getElementById("list").innerHTML =
          '<p class="text-sm text-muted-foreground">暂无资源。</p>';
      }

      function setError() {
        document.getElementById("list").innerHTML =
          '<p class="text-sm text-muted-foreground">加载失败，请稍后再试。</p>';
      }

      function load() {
        setLoading();
        fetch(API)
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            if (!Array.isArray(data) || data.length === 0) {
              setEmpty();
              return;
            }
            document.getElementById("list").innerHTML = data
              .map(renderRelease)
              .join("");
          })
          .catch(function () {
            setError();
          });
      }

      function syncThemeIcon() {
        var dark = document.documentElement.classList.contains("dark");
        var sun = document.getElementById("icon-sun-nav");
        var moon = document.getElementById("icon-moon-nav");
        if (sun) sun.classList.toggle("hidden", !dark);
        if (moon) moon.classList.toggle("hidden", dark);
      }

      function toggleTheme() {
        var dark = document.documentElement.classList.toggle("dark");
        try {
          localStorage.setItem("theme", dark ? "dark" : "light");
        } catch (e) {}
        syncThemeIcon();
      }

      var tn = document.getElementById("theme-toggle-nav");
      if (tn) tn.addEventListener("click", toggleTheme);

      syncThemeIcon();
      load();
    </script>
